<body>

<div class="navbar">

<div class="container">
   <h1>Real-Time Air Quality Dashboard</h1>

    <div class="search-box">
        <select id="stateSelect" onchange="updateCities()">
            <option value="">Select State</option>
        </select>
        <select id="citySelect">
            <option value="">Select City</option>
        </select>
        <button onclick="fetchDetailedAQI()">Check Air Quality</button>
    </div>

    <div id="dashboard" class="aqi-main-card">
        <h3 id="displayCity" style="color:#7f8c8d; font-weight: 400;">--</h3>
        <div id="liveAQI">--</div>
        <div id="aqiStatus" class="aqi-label">--</div>
        
        <div class="pollutant-grid">
            <div class="p-card"><div class="p-name">PM2.5 (Fine Particles)</div><div class="p-value" id="valPM25">--</div></div>
            <div class="p-card"><div class="p-name">PM10 (Dust/Smoke)</div><div class="p-value" id="valPM10">--</div></div>
            <div class="p-card"><div class="p-name">Local Temperature</div><div class="p-value" id="valTemp">--</div></div>
            <div class="p-card"><div class="p-name">Relative Humidity</div><div class="p-value" id="valHumi">--</div></div>
        </div>
    </div>

    <div class="chart-box">
        <h3 style="color: var(--primary); margin-bottom: 20px;">AQI Trend Visualization</h3>
        <canvas id="trendChart"></canvas>
    </div>
</div>

const stateSel = document.getElementById("stateSelect");
Object.keys(locationData).sort().forEach(state => {
    let opt = document.createElement("option");
    opt.value = state;
    opt.innerHTML = state;
    stateSel.appendChild(opt);
});

function updateCities() {
    const state = stateSel.value;
    const citySelect = document.getElementById("citySelect");
    citySelect.innerHTML = '<option value="">Select City</option>';
    if(state) {
        locationData[state].forEach(city => {
            let opt = document.createElement("option");
            opt.value = JSON.stringify(city);
            opt.innerHTML = city.n;
            citySelect.appendChild(opt);
        });
    }
}

async function fetchDetailedAQI() {
    const cityJson = document.getElementById("citySelect").value;
    if(!cityJson) return alert("Please select a city");

    const city = JSON.parse(cityJson);
    document.getElementById("dashboard").style.display = "block";

    try {
        const url = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${city.lat}&longitude=${city.lon}&current=us_aqi,pm10,pm2_5`;
        const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current=temperature_2m,relative_humidity_2m`;

        const [aqiRes, weatherRes] = await Promise.all([fetch(url), fetch(weatherUrl)]);
        const aqiData = await aqiRes.json();
        const weatherData = await weatherRes.json();

        const aqi = aqiData.current.us_aqi;
        
        document.getElementById("displayCity").innerText = city.n + ", " + stateSel.value;
        document.getElementById("liveAQI").innerText = aqi;
        document.getElementById("valPM25").innerText = aqiData.current.pm2_5 + " µg/m³";
        document.getElementById("valPM10").innerText = aqiData.current.pm10 + " µg/m³";
        document.getElementById("valTemp").innerText = weatherData.current.temperature_2m + "°C";
        document.getElementById("valHumi").innerText = weatherData.current.relative_humidity_2m + "%";

        const status = document.getElementById("aqiStatus");
        const card = document.getElementById("dashboard");
        let themeColor, textColor;

        if(aqi <= 50) { themeColor = "#e6f4ea"; textColor = "#00b894"; status.innerText = "Good"; }
        else if(aqi <= 100) { themeColor = "#fff9e6"; textColor = "#d4af37"; status.innerText = "Moderate"; }
        else if(aqi <= 200) { themeColor = "#fff3e6"; textColor = "#e67e22"; status.innerText = "Poor"; }
        else { themeColor = "#ffe6e6"; textColor = "#d63031"; status.innerText = "Severe"; }

        document.body.style.backgroundColor = themeColor;
        status.style.color = textColor;
        document.getElementById("liveAQI").style.color = textColor;

    } catch (e) { alert("Data fetch failed."); }
}

const ctx = document.getElementById('trendChart');
new Chart(ctx, {
    type: 'line',
    data: {
        labels: ['6AM','9AM','12PM','3PM','6PM','9PM','Live'],
        datasets: [{ 
            label: 'Recent AQI Levels', 
            data: [75, 82, 95, 110, 105, 90, 88], 
            borderColor: '#00b894', 
            backgroundColor: 'rgba(0, 184, 148, 0.1)',
            fill: true,
            tension: 0.4 
        }]
    },
    options: {
        responsive: true,
        plugins: { legend: { display: false } }
    }
});
</script>
</body>
</html>
